<div class="card glass-surface" [style.--cat-accent]="accent()">
  <div class="card__thumb">
    @if (entry().labelPhotoUrl; as photo) {
      <img [src]="photo" [alt]="entry().bourbonName" />
    } @else {
      <ion-icon name="wine-outline" aria-hidden="true"></ion-icon>
    }
  </div>

  <div class="card__body">
    <h3 class="card__name">{{ entry().bourbonName }}</h3>
    @if (entry().distillery) {
      <p class="card__distillery">{{ entry().distillery }}</p>
    }

    @if (entry().rating != null) {
      <app-rating-widget
        class="card__rating"
        [rating]="entry().rating ?? null"
        [size]="16"
      ></app-rating-widget>
    }

    <div class="card__meta">
      <span>{{ categoryLabel() }}</span>
      <span class="card__dot">·</span>
      <span>{{ entryTypeLabel() }}</span>
      @if (entryDate()) {
        <span class="card__dot">·</span>
        <span>{{ entryDate() | date: 'MMM d' }}</span>
      }
    </div>
  </div>
</div>
