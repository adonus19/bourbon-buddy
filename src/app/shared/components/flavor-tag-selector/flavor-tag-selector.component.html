<div class="flavor">
  <button
    type="button"
    class="flavor__header"
    (click)="toggleExpanded()"
    [attr.aria-expanded]="expanded()"
  >
    <span class="flavor__label">{{ label() }}</span>
    @if (selected().length) {
      <span class="flavor__count">{{ selected().length }}</span>
    }
    <ion-icon
      class="flavor__chevron"
      [name]="expanded() ? 'chevron-up-outline' : 'chevron-down-outline'"
    ></ion-icon>
  </button>

  @if (expanded()) {
    <div class="flavor__groups">
      <button
        type="button"
        class="flavor__more"
        (click)="toggleShowMore()"
        [attr.aria-expanded]="showMore()"
      >
        {{ showMore() ? 'Show fewer flavors' : 'Show more flavors' }}
      </button>

      @for (group of groups; track group.category) {
        @if (group.common.length || showMore()) {
          <div class="flavor__group">
            <span class="flavor__group-name">{{ group.category }}</span>
            <div class="flavor__chips">
              @for (tag of group.common; track tag) {
                <button
                  type="button"
                  class="chip"
                  [class.chip--selected]="isSelected(tag)"
                  (click)="toggle(tag)"
                >
                  {{ tag }}
                </button>
              }
              @for (tag of group.extended; track tag) {
                @if (showExtended(tag)) {
                  <button
                    type="button"
                    class="chip"
                    [class.chip--selected]="isSelected(tag)"
                    (click)="toggle(tag)"
                  >
                    {{ tag }}
                  </button>
                }
              }
            </div>
          </div>
        }
      }
    </div>
  }
</div>
