<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cellar</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/settings" aria-label="Settings">
        <ion-icon slot="icon-only" name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <app-coming-soon
    icon="wine-outline"
    title="Your glass is empty."
    subtitle="Tap + to log your first bourbon. (The full list view lands next.)"
  ></app-coming-soon>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/entry/new" aria-label="Add a bourbon">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
