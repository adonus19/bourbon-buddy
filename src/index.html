<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Bourbon Buddy</title>

  <base href="/" />

  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#141210" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Browser tab: the BB badge -->
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- PWA: install manifest + home-screen icon (the BB logo) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Bourbon Buddy" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- iOS launch (splash) screens for the installed home-screen app. iOS ignores
       the manifest for this and matches these per-device media queries exactly;
       Android/Chrome generate their splash from the manifest icon + bg color. -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="assets/splash/apple-splash-640x1136.png" />

  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="assets/splash/apple-splash-1170x2532.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="assets/splash/apple-splash-1179x2556.png" />

  <!-- Fonts: Playfair Display (display) + DM Sans (body/UI) are self-hosted

       them like any other asset. -->
