# Deploys the PWA to the bourbonbuddy-dev live channel on every push to main.
#
# Builds with the `staging` (dev Firebase config) configuration — NOT
# `production` — because the only project that exists today is bourbonbuddy-dev.
# The `production` configuration swaps in environment.prod.ts (placeholder
# bourbon-buddy-prod config) and would break Firebase/auth on the deployed app.
#
# When the prod project is created: fill in environment.prod.ts, switch this
# build to `npm run build:prod`, and point FIREBASE_PROJECT at bourbon-buddy-prod
# (with its own service-account secret).
#
# Required GitHub secret: FIREBASE_SERVICE_ACCOUNT_DEV (Firebase Hosting Admin).

name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FIREBASE_PROJECT: bourbonbuddy-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging — dev Firebase config)
        run: npm run build:staging

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: ${{ env.FIREBASE_PROJECT }}
          channelId: live
